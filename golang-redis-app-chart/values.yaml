image:
  repository: [dockerhub login]/golang-redis-app
  pullPolicy: IfNotPresent
  tag: "0.0.1"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

service:
  name: golang-redis-app
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: "letsencrypt-prod"
  hosts:
    - host: hex-server.site
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: hex-server.site-tls
      hosts:
        - hex-server.site