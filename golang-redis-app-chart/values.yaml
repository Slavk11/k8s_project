image:
  repository: hexg0/golang-redis-app
  pullPolicy: IfNotPresent
  tag: "0.0.2"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

service:
  name: golang-redis-app
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-url: "https://oauth2-proxy-1041128.radost.ru/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth2-proxy-1041128.radost.ru/oauth2/start?rd=https://$host$escaped_request_uri"
  hosts:
    - host: hex-server.site
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: hex-server.site-tls
      hosts:
        - hex-server.site

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: latest
  master:
    persistence:
      enabled: true
      size: 1Gi
  replica:
    replicaCount: 0
    persistence:
      enabled: true
      size: 1Gi
  auth:
    enabled: false