repositories:
- name: ingress-nginx
  url: https://kubernetes.github.io/ingress-nginx
- name: jetstack
  url: https://charts.jetstack.io

releases:
- name: ingress-nginx
  namespace: ingress-nginx
  createNamespace: true
  chart: ingress-nginx/ingress-nginx
  version: "4.12.3"
  values:
  - values-ovh.yaml

- name: mychart
  namespace: default
  chart: ./mychart
  version: "0.1.0"  

- name: cert-manager
  namespace: cert-manager
  createNamespace: true
  chart: jetstack/cert-manager
  version: "v1.18.0"
  set:
    - name: installCRDs
      value: true