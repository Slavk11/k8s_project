auth:
  adminUser: admin
  adminPassword: password901

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  tag: latest

ingress:
  enabled: true
  ingressClassName: "nginx"
  pathType: ImplementationSpecific
  apiVersion: ""
  hostname: keycloak-1041128.radost.ru
  path: /
  servicePort: http
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/proxy-buffer-size: 128k
    nginx.ingress.kubernetes.io/proxy-cookie-path: "off"
    use-forwarded-headers: "true"
  tls: true
  selfSigned: false

extraEnvVars:
  - name: KC_HOSTNAME
    value: https://keycloak-1041128.radost.ru
  - name: KC_PROXY_HEADERS
    value: xforwarded
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KEYCLOAK_DATABASE_HOST
    value: postgresql
  - name: KEYCLOAK_DATABASE_PORT
    value: "5432"
  - name: KEYCLOAK_DATABASE_NAME
    value: bitnami_keycloak
  - name: KEYCLOAK_DATABASE_USER
    value: bn_keycloak
  - name: KEYCLOAK_DATABASE_PASSWORD
    value: keycloak_db_password_123

postgresql:
  enabled: true
  fullnameOverride: postgresql
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: latest
  auth:
    username: bn_keycloak
    password: keycloak_db_password_123
    postgresPassword: postgres_admin_password_123
    database: bitnami_keycloak

customStartupProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

customReadinessProbe:
  httpGet:
    path: /realms/master
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12

customLivenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 300
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 1536Mi